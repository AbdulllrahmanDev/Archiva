<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editorial Intel - Document Curator</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#2d5383",
                    "on-surface": "#283439",
                    "surface-container-low": "#eff4f7",
                    "surface-container-highest": "#d7e5eb",
                    "on-tertiary-fixed-variant": "#565873",
                    "on-tertiary-fixed": "#3a3c55",
                    "error": "#9f403d",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#546166",
                    "outline": "#707d82",
                    "tertiary-fixed-dim": "#cecfef",
                    "on-background": "#283439",
                    "surface-tint": "#3b6090",
                    "surface-dim": "#ccdde4",
                    "surface-variant": "#d7e5eb",
                    "surface-container": "#e7eff3",
                    "surface-bright": "#f7fafc",
                    "on-error": "#fff7f6",
                    "inverse-surface": "#0b0f10",
                    "tertiary-fixed": "#ddddfe",
                    "surface": "#f7fafc",
                    "secondary-fixed": "#d4e4fc",
                    "background": "#f7fafc",
                    "on-secondary": "#f7f9ff",
                    "on-primary-fixed": "#16406f",
                    "tertiary-container": "#ddddfe",
                    "inverse-on-surface": "#9a9d9f",
                    "secondary": "#516075",
                    "secondary-fixed-dim": "#c6d5ee",
                    "secondary-dim": "#455468",
                    "primary-container": "#d4e3ff",
                    "on-error-container": "#752121",
                    "secondary-container": "#d4e4fc",
                    "on-secondary-container": "#445367",
                    "primary-fixed-dim": "#bdd6ff",
                    "on-primary-fixed-variant": "#385d8d",
                    "tertiary": "#5b5d78",
                    "on-tertiary-container": "#4c4e69",
                    "on-secondary-fixed": "#324054",
                    "inverse-primary": "#9fc3fa",
                    "on-primary": "#f6f7ff",
                    "on-tertiary": "#fbf8ff",
                    "surface-container-high": "#dfeaef",
                    "on-secondary-fixed-variant": "#4e5d71",
                    "tertiary-dim": "#4f516c",
                    "primary-dim": "#2e5484",
                    "error-container": "#fe8983",
                    "primary-fixed": "#d4e3ff",
                    "primary": "#3b6090",
                    "outline-variant": "#a7b4ba",
                    "error-dim": "#4e0309"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #3b6090 0%, #2e5484 100%);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen">
<!-- TopNavBar Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-4 bg-[#ffffff]/80 dark:bg-slate-900/80 backdrop-blur-xl font-['Manrope'] antialiased tracking-tight">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tighter text-slate-800 dark:text-slate-100">Editorial Intel</span>
</div>
<div class="flex items-center gap-4">
<!-- Trailing Icons -->
<button class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-300 ease-[cubic-bezier(0.2,0,0,1)] scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
<button class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-300 ease-[cubic-bezier(0.2,0,0,1)] scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">search</span>
</button>
<button class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-300 ease-[cubic-bezier(0.2,0,0,1)] scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">archive</span>
</button>
<!-- Profile Space -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex flex-col items-center justify-center min-h-screen px-6">
<!-- Ambient Decorative Element (Subtle soft blur) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute top-[60%] -right-[5%] w-[30%] h-[30%] bg-tertiary-container/20 blur-[100px] rounded-full"></div>
</div>
<div class="relative z-10 text-center space-y-12">
<!-- Hero Typography -->
<div class="space-y-4">
<h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tighter text-on-surface">
                    Curate your knowledge.
                </h1>
<p class="text-on-surface-variant text-lg max-w-md mx-auto leading-relaxed">
                    Upload your documents to begin a deep editorial analysis powered by intelligence.
                </p>
</div>
<!-- Giant Action Anchor -->
<div class="flex flex-col items-center justify-center gap-8">
<button class="group relative flex items-center justify-center w-32 h-32 md:w-40 md:h-40 rounded-[2rem] editorial-gradient text-on-primary shadow-2xl shadow-primary/20 hover:shadow-primary/40 transition-all duration-500 ease-[cubic-bezier(0.2,0,0,1)] active:scale-95">
<!-- Subtle Inner Glow -->
<div class="absolute inset-0 rounded-[2rem] border border-white/10"></div>
<span class="material-symbols-outlined text-6xl md:text-7xl font-light group-hover:rotate-90 transition-transform duration-500 ease-[cubic-bezier(0.2,0,0,1)]">
                        add
                    </span>
</button>
<!-- Secondary Prompt -->
<div class="flex flex-col items-center gap-2">
<span class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant font-semibold">
                        Drag and drop files
                    </span>
<div class="h-1 w-12 bg-outline-variant/30 rounded-full"></div>
</div>
</div>
</div>
<!-- Utility Bottom Hint -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-6 px-6 py-3 bg-surface-container-lowest/80 backdrop-blur-xl rounded-full shadow-[0px_8px_32px_rgba(40,52,57,0.06)] border border-outline-variant/10">
<div class="flex items-center gap-2 text-on-surface-variant text-sm">
<span class="material-symbols-outlined text-base">description</span>
<span class="font-medium">Supports PDF, DOCX</span>
</div>
<div class="w-px h-4 bg-outline-variant/20"></div>
<div class="flex items-center gap-2 text-on-surface-variant text-sm">
<span class="material-symbols-outlined text-base">verified_user</span>
<span class="font-medium">Encrypted &amp; Secure</span>
</div>
</div>
</main>
<!-- Side Labels / Editorial Accents -->
<aside class="fixed left-8 top-1/2 -translate-y-1/2 hidden xl:flex flex-col gap-24">
<div class="rotate-[-90deg] origin-left">
<span class="font-label text-[10px] uppercase tracking-[0.4em] text-outline/40 font-bold whitespace-nowrap">
                Workspace v.2.4 — Editorial Intelligence
            </span>
</div>
</aside>
<aside class="fixed right-8 top-1/2 -translate-y-1/2 hidden xl:flex flex-col gap-24">
<div class="rotate-[90deg] origin-right">
<span class="font-label text-[10px] uppercase tracking-[0.4em] text-outline/40 font-bold whitespace-nowrap">
                Ready for Analysis — 0 Docs Loaded
            </span>
</div>
</aside>
</body></html>
